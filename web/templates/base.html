<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LeisureSpot — Botswana's Lifestyle Platform{% endblock %}</title>
  <meta name="description" content="{% block description %}Discover and book the best experiences in Botswana — safaris, dining, wellness, and more.{% endblock %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/pages.css">
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% include 'navbar.html' %}
  <main>{% block content %}{% endblock %}</main>
  {% include 'footer.html' %}
  <div id="toast-container"></div>
  <script src="https://unpkg.com/lucide@0.525.0/dist/umd/lucide.min.js"></script>
  <script>window.API_BASE = "{{ api_base_url }}";</script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/icons.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/listings.js"></script>
  <script src="/static/js/notifications.js"></script>
  {% block extra_js %}{% endblock %}
  <script>document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });</script>
</body>
</html>
