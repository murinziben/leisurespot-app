version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: leisurespot_postgres
    environment:
      POSTGRES_USER: leisurespot
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: leisurespot_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leisurespot -d leisurespot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: leisurespot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
